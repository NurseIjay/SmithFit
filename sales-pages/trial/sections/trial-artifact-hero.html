<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14-Day Free Trial - SmithFit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #4a4a4a;
        }

        .hero {
            background: linear-gradient(135deg, #FFF8F0 0%, #FFFBF5 100%);
            padding: 60px 20px;
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(197, 165, 90, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .hero-content {
            max-width: 600px;
            z-index: 2;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .hero-content {
                margin: 0;
            }
        }

        .pre-heading {
            color: #C5A55A;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            display: inline-block;
        }

        h1 {
            color: #1a1a2e;
            font-size: 48px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        @media (max-width: 767px) {
            h1 {
                font-size: 36px;
            }
        }

        .subheading {
            color: #4a4a4a;
            font-size: 20px;
            line-height: 1.5;
            margin-bottom: 32px;
            font-weight: 500;
        }

        @media (max-width: 767px) {
            .subheading {
                font-size: 18px;
            }
        }

        .cta-button {
            display: inline-block;
            background-color: #2D7A3A;
            color: white;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(45, 122, 58, 0.25);
            margin-bottom: 20px;
        }

        .cta-button:hover {
            background-color: #245d2e;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(45, 122, 58, 0.35);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        .reassurance {
            color: #4a4a4a;
            font-size: 14px;
            font-weight: 500;
            margin-top: 12px;
        }

        .reassurance-check {
            color: #2D7A3A;
            margin-right: 6px;
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-content">
            <div class="pre-heading">A Personal Note from Nurse Yay</div>
            <h1>You Want Proof Before You Commit. I Respect That.</h1>
            <p class="subheading">Try everything free for 14 days. See results first. Then decide.</p>
            <button class="cta-button">YES — Start My 14-Day FREE Trial →</button>
            <p class="reassurance">
                <span class="reassurance-check">✓</span>
                No payment for 14 days. Cancel anytime — no charge.
            </p>
        </div>
    </section>
</body>
</html>
