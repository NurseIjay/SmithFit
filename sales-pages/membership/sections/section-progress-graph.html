<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --gold: #c9a84c; --gold-light: #d4b86a; --gold-dark: #a88a3a;
    --cream: #faf6ef; --cream-dark: #f0e8d8;
    --text-dark: #1a1a1a; --text-body: #3d3d3d; --text-muted: #6b6b6b;
    --green: #2d6a4f; --white: #ffffff;
    --red: #c0392b;
  }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--cream); color: var(--text-dark); line-height: 1.6; }

  .sf-graph-section { max-width: 780px; margin: 0 auto; padding: 60px 20px; }
  .sf-graph-section-label { text-align: center; font-size: 13px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
  .sf-graph-section-title { text-align: center; font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; line-height: 1.2; }
  .sf-graph-section-subtitle { text-align: center; font-size: 16px; color: var(--text-muted); margin-bottom: 40px; max-width: 600px; margin-left: auto; margin-right: auto; }

  .sf-graph-container { max-width: 700px; margin: 0 auto; position: relative; }
  .sf-graph-canvas { position: relative; width: 100%; height: 300px; background: #f5f0e8; border-radius: 12px; overflow: hidden; }
  .sf-graph-svg { width: 100%; height: 100%; }
  .sf-graph-stat { text-align: center; margin-top: 20px; font-size: 16px; color: var(--red); font-weight: 600; opacity: 0; transition: opacity 1s ease 2s; }
  .sf-graph-stat.visible { opacity: 1; }

  /* CTA below graph */
  .sf-graph-cta { text-align: center; margin-top: 32px; }
  .sf-graph-cta-btn {
    display: inline-block; background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: white; font-size: 16px; font-weight: 700; padding: 16px 36px;
    border: none; border-radius: 12px; cursor: pointer; text-decoration: none;
    transition: all 0.2s; box-shadow: 0 4px 16px rgba(201,168,76,0.3);
    -webkit-appearance: none;
  }
  .sf-graph-cta-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(201,168,76,0.4); }
  .sf-graph-cta-sub { font-size: 13px; color: var(--text-muted); margin-top: 10px; }
  .sf-graph-cta-sub .shield { margin-right: 4px; }

  @media (max-width: 640px) {
    .sf-graph-section { padding: 40px 16px; }
    .sf-graph-section-title { font-size: 26px; }
    .sf-graph-canvas { height: 220px; }
  }
</style>

<div class="sf-graph-section">
  <div class="sf-graph-section-label">THE DAY 8 CLIFF</div>
  <div class="sf-graph-section-title">What Happens After Day 7?</div>
  <div class="sf-graph-section-subtitle">Your progress doesn't have to stop here. See what membership does to your trajectory.</div>

  <div class="sf-graph-container">
    <div class="sf-graph-canvas">
      <svg class="sf-graph-svg" viewBox="0 0 700 300" id="progressGraph">
        <!-- Grid lines -->
        <line x1="60" y1="40" x2="60" y2="260" stroke="#d8d0c0" stroke-width="1"/>
        <line x1="60" y1="260" x2="660" y2="260" stroke="#d8d0c0" stroke-width="1"/>
        <line x1="60" y1="150" x2="660" y2="150" stroke="#e8e0d0" stroke-width="1" stroke-dasharray="4"/>
        <!-- Y-axis Labels -->
        <text x="30" y="48" fill="#999" font-size="11" text-anchor="middle" font-family="Inter">High</text>
        <text x="30" y="155" fill="#999" font-size="11" text-anchor="middle" font-family="Inter">Base</text>
        <text x="30" y="265" fill="#999" font-size="11" text-anchor="middle" font-family="Inter">Low</text>
        <!-- X-axis labels -->
        <text x="100" y="285" fill="#999" font-size="11" text-anchor="middle" font-family="Inter">Day 7</text>
        <text x="220" y="285" fill="#999" font-size="11" text-anchor="middle" font-family="Inter">Day 14</text>
        <text x="340" y="285" fill="#999" font-size="11" text-anchor="middle" font-family="Inter">Day 21</text>
        <text x="460" y="285" fill="#999" font-size="11" text-anchor="middle" font-family="Inter">Month 2</text>
        <text x="580" y="285" fill="#999" font-size="11" text-anchor="middle" font-family="Inter">Month 6</text>
        <!-- YOU ARE HERE marker -->
        <circle cx="100" cy="130" r="6" fill="#c9a84c" stroke="white" stroke-width="2"/>
        <text x="100" y="118" fill="#c9a84c" font-size="10" text-anchor="middle" font-weight="700" font-family="Inter">YOU ARE HERE</text>
        <!-- DANGER ZONE -->
        <rect x="140" y="170" width="120" height="80" rx="8" fill="#c0392b" opacity="0" id="dangerZone" style="transition: opacity 1s ease 1.5s;"/>
        <text x="200" y="215" fill="#c0392b" font-size="10" text-anchor="middle" font-weight="700" font-family="Inter" opacity="0" id="dangerText" style="transition: opacity 1s ease 1.5s;">DANGER ZONE</text>
        <!-- WITH MEMBERSHIP line (animated) -->
        <path id="withLine" d="M100,130 C180,120 280,80 400,60 S560,45 640,40" fill="none" stroke="#c9a84c" stroke-width="3" stroke-linecap="round" stroke-dasharray="600" stroke-dashoffset="600" style="transition: stroke-dashoffset 2.5s ease;"/>
        <text x="645" y="35" fill="#c9a84c" font-size="10" font-weight="700" font-family="Inter" opacity="0" id="withLabel" style="transition: opacity 0.5s ease 2.5s;">WITH MEMBERSHIP</text>
        <!-- WITHOUT line (animated) -->
        <path id="withoutLine" d="M100,130 C160,155 200,190 260,220 S380,240 500,245 S600,248 640,250" fill="none" stroke="#c0392b" stroke-width="3" stroke-linecap="round" stroke-dasharray="600" stroke-dashoffset="600" style="transition: stroke-dashoffset 2.5s ease 0.5s;"/>
        <text x="645" y="255" fill="#c0392b" font-size="10" font-weight="700" font-family="Inter" opacity="0" id="withoutLabel" style="transition: opacity 0.5s ease 2.5s;">WITHOUT</text>
      </svg>
    </div>
    <div class="sf-graph-stat" id="graphStat">87% of nurses without a Day 8 plan lose all progress within 3 weeks.</div>
  </div>

  <div class="sf-graph-cta">
    <a href="#checkout" class="sf-graph-cta-btn">Don't Let Day 8 Erase Your Progress &rarr;</a>
    <div class="sf-graph-cta-sub"><span class="shield">🛡️</span> 30-day money-back guarantee. Cancel anytime.</div>
  </div>
</div>

<script>
(function() {
  try {
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var withLine = document.getElementById('withLine');
          var withoutLine = document.getElementById('withoutLine');
          var dangerZone = document.getElementById('dangerZone');
          var dangerText = document.getElementById('dangerText');
          var withLabel = document.getElementById('withLabel');
          var withoutLabel = document.getElementById('withoutLabel');
          var graphStat = document.getElementById('graphStat');
          
          if (withLine) withLine.style.strokeDashoffset = '0';
          if (withoutLine) withoutLine.style.strokeDashoffset = '0';
          if (dangerZone) dangerZone.style.opacity = '0.08';
          if (dangerText) dangerText.style.opacity = '1';
          if (withLabel) withLabel.style.opacity = '1';
          if (withoutLabel) withoutLabel.style.opacity = '1';
          if (graphStat) graphStat.classList.add('visible');
        }
      });
    }, { threshold: 0.3 });
    
    var progressGraph = document.getElementById('progressGraph');
    if (progressGraph) {
      observer.observe(progressGraph);
    }
  } catch(e) {
    console.error('SmithFit Progress Graph error:', e);
  }
})();
</script>
